<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday!</title>
<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #1f1f1f, #2c2c2c);
        color: white;
        text-align: center;
        overflow: hidden;
    }

    h1 {
        margin-top: 40px;
        font-size: 3em;
    }

    p {
        opacity: 0.8;
    }

    #gameArea {
        position: relative;
        width: 100%;
        height: 70vh;
        margin-top: 20px;
        border-top: 2px solid rgba(255,255,255,0.1);
    }

    .mushroom {
        position: absolute;
        font-size: 40px;
        cursor: pointer;
        transition: transform 0.1s;
    }

    .mushroom:active {
        transform: scale(0.8);
    }

    #score {
        font-size: 1.5em;
        margin-top: 10px;
    }

    #startBtn {
        padding: 10px 20px;
        border: none;
        background: #ff4d6d;
        color: white;
        font-size: 1em;
        border-radius: 8px;
        cursor: pointer;
    }

    #startBtn:hover {
        background: #ff2e55;
    }
</style>
</head>
<body>

<h1>🎉 Happy Birthday! 🎉</h1>
<p>Catch as many mushrooms as you can!</p>

<button id="startBtn">Start Game</button>
<div id="score">Score: 0</div>

<div id="gameArea"></div>

<script>
let score = 0;
let gameInterval;

const gameArea = document.getElementById("gameArea");
const scoreDisplay = document.getElementById("score");
const startBtn = document.getElementById("startBtn");

startBtn.onclick = () => {
    score = 0;
    scoreDisplay.textContent = "Score: 0";
    startBtn.style.display = "none";

    gameInterval = setInterval(spawnMushroom, 700);

    setTimeout(() => {
        clearInterval(gameInterval);
        alert("🎂 Time's up! Your score: " + score);
        startBtn.style.display = "inline-block";
    }, 15000);
};

function spawnMushroom() {
    const mushroom = document.createElement("div");
    mushroom.classList.add("mushroom");
    mushroom.textContent = "🍄";

    const x = Math.random() * (window.innerWidth - 50);
    const y = Math.random() * (window.innerHeight - 150);

    mushroom.style.left = x + "px";
    mushroom.style.top = y + "px";

    mushroom.onclick = () => {
        score++;
        scoreDisplay.textContent = "Score: " + score;
        mushroom.remove();
    };

    gameArea.appendChild(mushroom);

    setTimeout(() => {
        mushroom.remove();
    }, 1000);
}
</script>

</body>
</html>
