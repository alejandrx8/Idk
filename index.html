<!DOCTYPE html>
<html>
<head>
  <title>Mini Game</title>
</head>
<body>
  <h1>Click Game</h1>
  <button onclick="addScore()">Click me</button>
  <p>Score: <span id="score">0</span></p>

  <script>
    let score = 0;
    function addScore() {
      score++;
      document.getElementById("score").innerText = score;
    }
  </script>
</body>
</html>
